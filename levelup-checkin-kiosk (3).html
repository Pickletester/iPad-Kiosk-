<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Level Up Pickleball — Check-In</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1db954;
    --green-dark: #158a3e;
    --red: #e63946;
    --red-dark: #a4262f;
    --bg: #0d0d0f;
    --surface: #16181c;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ─── IDLE SCREEN ─── */
  #screen-idle {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    background: var(--bg);
    transition: opacity 0.4s;
  }

  .idle-logo img {
    width: clamp(260px, 45vw, 500px);
    height: auto;
    display: block;
  }

  /* member card mockup */
  .mock-card {
    width: clamp(280px, 48vw, 440px);
    background: #2a2a2a;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }
  .mock-card-top {
    background: #3a3a3a;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .mock-card-left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .mock-dupr {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #555;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
  }
  .mock-dupr span:first-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    color: #ccc;
    letter-spacing: 1px;
  }
  .mock-dupr span:last-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    color: #999;
    letter-spacing: 1px;
  }
  .mock-member-since {
    font-size: 11px;
    color: #999;
    font-weight: 500;
  }
  .mock-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 3.5vw, 30px);
    color: #ddd;
    white-space: nowrap;
  }
  .mock-photo {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #555;
    border: 2px solid #666;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mock-photo svg { width: 40px; height: 40px; opacity: 0.4; }
  .mock-card-bottom {
    background: #222;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mock-tier {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
  }
  /* barcode lines */
  .mock-barcode {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 28px;
  }
  .mock-barcode .bar {
    background: #666;
    height: 100%;
    border-radius: 1px;
    animation: barcode-pulse 2s ease-in-out infinite;
  }
  @keyframes barcode-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  .scan-prompt {
    margin-top: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  .scan-icon {
    width: 80px; height: 80px;
    border: 3px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    animation: pulse-idle 2.5s ease-in-out infinite;
  }
  .scan-icon svg { width: 40px; height: 40px; opacity: 0.5; }

  @keyframes pulse-idle {
    0%, 100% { border-color: rgba(255,255,255,0.1); box-shadow: none; }
    50% { border-color: rgba(29,185,84,0.5); box-shadow: 0 0 24px rgba(29,185,84,0.15); }
  }

  .scan-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* hidden input that always captures scanner keystrokes */
  #scanner-input {
    position: fixed;
    top: -9999px; left: -9999px;
    opacity: 0; width: 1px; height: 1px;
  }

  /* ─── RESULT SCREENS ─── */
  #screen-result {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    padding: 40px;
    text-align: center;
    transition: opacity 0.3s;
  }

  #screen-result.show { display: flex; }

  /* GREEN state */
  #screen-result.state-green {
    background: radial-gradient(ellipse at center, #0d2e18 0%, #060f0a 60%);
    animation: flash-green 0.5s ease-out;
  }
  @keyframes flash-green {
    0% { background: #1db954; }
    100% { background: radial-gradient(ellipse at center, #0d2e18 0%, #060f0a 60%); }
  }

  /* RED state */
  #screen-result.state-red {
    background: radial-gradient(ellipse at center, #2e0d0d 0%, #0f0606 60%);
    animation: flash-red 0.5s ease-out;
  }
  @keyframes flash-red {
    0% { background: #e63946; }
    100% { background: radial-gradient(ellipse at center, #2e0d0d 0%, #0f0606 60%); }
  }

  /* status ring */
  .status-ring {
    width: clamp(100px, 18vw, 160px);
    height: clamp(100px, 18vw, 160px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .state-green .status-ring {
    background: radial-gradient(circle, #1db95430, transparent);
    border: 4px solid var(--green);
    box-shadow: 0 0 40px rgba(29,185,84,0.5), inset 0 0 40px rgba(29,185,84,0.1);
    animation: ring-pulse-green 1.5s ease-in-out infinite;
  }
  .state-red .status-ring {
    background: radial-gradient(circle, #e6394630, transparent);
    border: 4px solid var(--red);
    box-shadow: 0 0 40px rgba(230,57,70,0.5), inset 0 0 40px rgba(230,57,70,0.1);
    animation: ring-pulse-red 0.4s ease-in-out 3;
  }
  @keyframes ring-pulse-green {
    0%, 100% { box-shadow: 0 0 30px rgba(29,185,84,0.4); }
    50% { box-shadow: 0 0 60px rgba(29,185,84,0.7); }
  }
  @keyframes ring-pulse-red {
    0%, 100% { box-shadow: 0 0 30px rgba(230,57,70,0.4); }
    50% { box-shadow: 0 0 80px rgba(230,57,70,0.9); }
  }
  .status-ring svg { width: 50%; height: 50%; }

  .status-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(36px, 8vw, 72px);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
  }
  .state-green .status-label { color: var(--green); }
  .state-red .status-label { color: var(--red); }

  .member-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 9vw, 90px);
    line-height: 1;
    letter-spacing: -1px;
    color: #fff;
  }

  .session-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    max-width: 700px;
  }

  .session-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(29,185,84,0.3);
    border-radius: 16px;
    padding: 18px 28px;
    text-align: left;
    min-width: 200px;
  }
  .session-card .sc-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }
  .session-card .sc-time {
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 600;
    color: #fff;
  }

  /* RED screen details */
  .not-signed-up-msg {
    font-size: clamp(18px, 3.5vw, 28px);
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    max-width: 480px;
    line-height: 1.4;
  }
  .not-signed-up-sub {
    font-size: clamp(14px, 2.5vw, 18px);
    color: rgba(255,255,255,0.35);
  }

  /* countdown bar */
  .countdown-bar-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.08);
  }
  .countdown-bar {
    height: 100%;
    width: 100%;
    transform-origin: left;
    transition: transform linear;
  }
  .state-green .countdown-bar { background: var(--green); }
  .state-red .countdown-bar { background: var(--red); }

  /* ─── LOADING ─── */
  #screen-loading {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: var(--bg);
    flex-direction: column;
    gap: 24px;
  }
  #screen-loading.show { display: flex; }
  .spinner {
    width: 56px; height: 56px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─── CONFIG NOTICE ─── */
  #config-notice {
    position: fixed;
    top: 16px; right: 16px;
    background: rgba(255,200,0,0.15);
    border: 1px solid rgba(255,200,0,0.4);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: rgba(255,200,0,0.9);
    display: none;
    z-index: 100;
  }
  #config-notice.show { display: block; }


</style>
</head>

<script>
// ─────────────────────────────────────────────
// CONFIG — swap in your real Cloudflare Worker URL
// ─────────────────────────────────────────────
const CONFIG = {
  workerUrl: 'https://courtreserve-member-lookup.s-jackson.workers.dev',
  displaySeconds: 6,   // how long to show result before returning to idle
  lookAheadMinutes: 60 // sessions within this window count as "signed up"
};

// ─────────────────────────────────────────────
// DEMO DATA
// ─────────────────────────────────────────────
const DEMO = {
  green: {
    memberId: '12345',
    firstName: 'Sarah',
    lastName: 'Mitchell',
    sessions: [
      { type: 'Open Play', startTime: '10:00 AM', endTime: '11:30 AM' },
    ]
  },
  red: {
    memberId: '99999',
    firstName: 'Alex',
    lastName: 'Turner',
    sessions: []
  }
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const isDemoMode = false;
let scanBuffer = '';
let scanTimer = null;
let returnTimer = null;
let countdownAnim = null;

// ─────────────────────────────────────────────
// ELEMENTS
// ─────────────────────────────────────────────
const $idle     = document.getElementById('screen-idle');
const $loading  = document.getElementById('screen-loading');
const $result   = document.getElementById('screen-result');
const $ring     = document.getElementById('status-ring');
const $label    = document.getElementById('status-label');
const $name     = document.getElementById('member-name');
const $cards    = document.getElementById('session-cards');
const $noMsg    = document.getElementById('no-signup-msg');
const $noSub    = document.getElementById('no-signup-sub');
const $bar      = document.getElementById('countdown-bar');
const $notice   = document.getElementById('config-notice');
const $scanInput = document.getElementById('scanner-input');

if (isDemoMode) {
  $notice.classList.add('show');
}

// ─────────────────────────────────────────────
// SCANNER INPUT — captures HID barcode scanner
// Scanner acts like keyboard: types digits + Enter
// ─────────────────────────────────────────────
function keepFocus() {
  $scanInput.focus();
}
document.addEventListener('click', keepFocus);
document.addEventListener('touchend', keepFocus);
keepFocus();

$scanInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const id = scanBuffer.trim();
    scanBuffer = '';
    clearTimeout(scanTimer);
    if (id.length > 0) handleScan(id);
    return;
  }
  if (e.key.length === 1) {
    scanBuffer += e.key;
    clearTimeout(scanTimer);
    scanTimer = setTimeout(() => { scanBuffer = ''; }, 500);
  }
});

// ─────────────────────────────────────────────
// HANDLE SCAN
// ─────────────────────────────────────────────
async function handleScan(memberId) {
  // Don't allow scan while showing a result
  if ($result.classList.contains('show')) return;

  showLoading();

  try {
    let memberData;
    if (isDemoMode) {
      await sleep(900);
      memberData = await demoLookup(memberId);
    } else {
      memberData = await fetchFromCourtReserve(memberId);
    }

    const activeSessions = getActiveSessions(memberData.sessions);
    const hasSession = activeSessions.length > 0;

    showResult(hasSession, memberData, activeSessions);
  } catch (err) {
    console.error('Lookup error:', err);
    showResult(false, { firstName: 'Member', lastName: '', sessions: [] }, []);
  }
}

// ─────────────────────────────────────────────
// COURTRESERVE API FETCH via Cloudflare Worker
// Your Worker should accept: GET /?memberId=XXXX&orgId=YYYY
// and return JSON: { firstName, lastName, sessions: [{type, startTime, endTime}] }
// ─────────────────────────────────────────────
async function fetchFromCourtReserve(memberId) {
  const url = `${CONFIG.workerUrl}/api/member?memberId=${encodeURIComponent(memberId)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Worker returned ${res.status}`);
  return await res.json();
}

// ─────────────────────────────────────────────
// FILTER SESSIONS within look-ahead window
// ─────────────────────────────────────────────
function getActiveSessions(sessions) {
  if (!sessions || sessions.length === 0) return [];
  const now = new Date();
  const cutoff = new Date(now.getTime() + CONFIG.lookAheadMinutes * 60 * 1000);

  return sessions.filter(s => {
    // Expecting startTime as a parseable time string or ISO
    const start = parseTime(s.startTime);
    const end = parseTime(s.endTime);
    if (!start) return true; // if we can't parse, show it
    // Session starts within next 60 min OR is currently running
    return start <= cutoff && end >= now;
  });
}

function parseTime(timeStr) {
  if (!timeStr) return null;
  // Handle "10:00 AM" style
  const today = new Date().toDateString();
  const d = new Date(`${today} ${timeStr}`);
  if (!isNaN(d)) return d;
  // Handle ISO
  const iso = new Date(timeStr);
  if (!isNaN(iso)) return iso;
  return null;
}





// ─────────────────────────────────────────────
// UI TRANSITIONS
// ─────────────────────────────────────────────
function showLoading() {
  clearReturnTimer();
  $idle.style.opacity = '0';
  $idle.style.pointerEvents = 'none';
  $loading.classList.add('show');
  $result.classList.remove('show', 'state-green', 'state-red');
}

function showResult(found, member, sessions) {
  $loading.classList.remove('show');

  $result.classList.remove('state-green', 'state-red');
  $result.classList.add('show');

  if (found) {
    playChime();
    $result.classList.add('state-green');
    $ring.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#1db954" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    $label.textContent = "You're In!";
    $name.textContent = `${member.firstName} ${member.lastName}`;
    $name.style.display = 'block';
    $cards.innerHTML = '';
    sessions.forEach(s => {
      const card = document.createElement('div');
      card.className = 'session-card';
      card.innerHTML = `
        <div class="sc-type">${s.type || 'Session'}</div>
        <div class="sc-time">${formatTime(s.startTime)} – ${formatTime(s.endTime)}</div>
      `;
      $cards.appendChild(card);
    });
    $cards.style.display = 'flex';
    $noMsg.style.display = 'none';
    $noSub.style.display = 'none';
  } else {
    playBuzz();
    $result.classList.add('state-red');
    $ring.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    $label.textContent = "Not Signed Up";
    $name.textContent = member.firstName ? `${member.firstName} ${member.lastName}` : '';
    $name.style.display = member.firstName ? 'block' : 'none';
    $cards.innerHTML = '';
    $cards.style.display = 'none';
    $noMsg.textContent = 'No reservation found in the next hour.';
    $noMsg.style.display = 'block';
    $noSub.textContent = 'Please sign up at the front desk or on the app.';
    $noSub.style.display = 'block';
  }

  // Countdown bar
  startCountdown(CONFIG.displaySeconds);
}

function startCountdown(seconds) {
  $bar.style.transition = 'none';
  $bar.style.transform = 'scaleX(1)';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      $bar.style.transition = `transform ${seconds}s linear`;
      $bar.style.transform = 'scaleX(0)';
    });
  });

  returnTimer = setTimeout(returnToIdle, seconds * 1000);
}

function returnToIdle() {
  $result.classList.remove('show', 'state-green', 'state-red');
  $idle.style.opacity = '1';
  $idle.style.pointerEvents = 'auto';
  keepFocus();
}

function clearReturnTimer() {
  if (returnTimer) { clearTimeout(returnTimer); returnTimer = null; }
}

function formatTime(t) {
  if (!t) return '';
  const d = parseTime(t);
  if (!d) return t;
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────
// SOUNDS via Web Audio API
// ─────────────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playChime() {
  const ctx = getAudioCtx();
  // Pleasant three-note ascending chime: C5 E5 G5
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = ctx.currentTime + i * 0.13;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.4, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
    osc.start(start);
    osc.stop(start + 0.65);
  });
}

function playBuzz() {
  const ctx = getAudioCtx();
  // Low buzzy error tone
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.35, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.55);
}

// Keep scanner input always focused
setInterval(keepFocus, 2000);
</script>
